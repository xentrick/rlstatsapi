[package]
name = "rlstatsapi"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "fuzz"]
default-members = ["."]

[dependencies]
dotenvy = "0.15"
futures-util = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.44", features = [
    "macros",
    "rt-multi-thread",
    "time",
    "net",
    "io-util",
] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "events_parsing"
harness = false
